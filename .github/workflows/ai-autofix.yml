name: AI AutoFix

on:
  issues:
    types: [labeled]

jobs:
  fix:
    if: github.event.label.name == 'ai-fix'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get issue details
        id: issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            return {
              title: issue.title,
              body: issue.body,
              number: issue.number
            };

      - name: Prepare request body
        id: body
        run: |
          TITLE="${{ fromJson(steps.issue.outputs.result).title }}"
          BODY="${{ fromJson(steps.issue.outputs.result).body }}"
          # Формируем JSON с помощью jq для гарантированной валидности
          jq -n --arg title "$TITLE" --arg body "$BODY" '{
            model: "deepseek-chat",
            messages: [
              {role: "system", content: "Ты ассистент, который генерирует исправления кода в репозитории marsianin (Next.js 14, TypeScript, TailwindCSS). Ответь СТРОГО в формате:\nFILE: <путь>\nCONTENT: <весь код файла>\n---\nFILE: <путь>\nCONTENT: <весь код файла>\n(разделяй файлы маркером ---). Не добавляй пояснений, только код."},
              {role: "user", content: ("Задача: " + $title + ". Подробности: " + $body + ".")}
            ],
            max_tokens: 4000
          }' > request.json

      - name: Call DeepSeek API with curl
        id: ai
        run: |
          RESPONSE=$(curl -s -X POST "https://api.deepseek.com/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEEPSEEK_API_KEY }}" \
            -d @request.json)
          echo "$RESPONSE" > response.json
          # Выведем часть ответа для лога
          echo "Response: $(cat response.json | jq -c '.choices[0].message.content // .error')"

      - name: Parse response and apply changes
        id: apply
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = JSON.parse(fs.readFileSync('response.json', 'utf8'));
            if (response.error) {
              core.setFailed('API Error: ' + JSON.stringify(response.error));
              return;
            }
            const content = response.choices[0].message.content;
            console.log('AI response content:', content);
            
            const blocks = content.split('---');
            const path = require('path');
            
            for (const block of blocks) {
              const fileMatch = block.match(/FILE:\s*(.+)/);
              const contentMatch = block.match(/CONTENT:\s*([\s\S]*)/);
              if (fileMatch && contentMatch) {
                const filePath = fileMatch[1].trim();
                const fileContent = contentMatch[1].trim();
                fs.mkdirSync(path.dirname(filePath), { recursive: true });
                fs.writeFileSync(filePath, fileContent);
                console.log(`Updated file: ${filePath}`);
              }
            }

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: '🤖 AI fix: ${{ fromJson(steps.issue.outputs.result).title }}'
          branch: ai/issue-${{ github.run_id }}
          title: '🤖 AI Fix: ${{ fromJson(steps.issue.outputs.result).title }}'
          body: |
            Автоматический PR, созданный по [задаче #${{ fromJson(steps.issue.outputs.result).number }}](https://github.com/${{ github.repository }}/issues/${{ fromJson(steps.issue.outputs.result).number }}).
            
            Задача: ${{ fromJson(steps.issue.outputs.result).title }}
            
            Изменения сгенерированы моделью DeepSeek.
          labels: 'ai-generated'
